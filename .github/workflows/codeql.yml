name: CodeQL

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "28 1 * * 3"

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    # This repo is Markdown/skills/config + GitHub Actions workflows only (no JS/TS sources).
    # Use the CodeQL "actions" language per https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning
    name: Analyze (actions)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 360

    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@e24db849895960b0c2863e7b441998cd0092c104 # v1
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"
